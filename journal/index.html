<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Journal Digital</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Meu Diário</h1>
        <div class="header-controls">
            <button id="theme-btn" onclick="toggleTheme()">🌙 Tema</button>
            <button id="google-login-btn" onclick="handleAuthClick()">🔑 Login Google</button>
        </div>
    </header>

    <main class="container">
        <p id="auth-status" style="color: #666; font-size: 0.9em;">Desconectado do Google Drive</p>

        <div class="journal-card">
            <input type="text" id="title-input" placeholder="Título da memória...">
            <textarea id="text-input" placeholder="O que aconteceu hoje?"></textarea>

            <div class="media-section">
                <label for="media-upload" class="upload-btn">📷 Adicionar Foto/Vídeo</label>
                <input type="file" id="media-upload" accept="image/*,video/*" onchange="previewMedia(event)">
                
                <div id="preview-container"></div>
            </div>

            <button class="save-btn" onclick="saveToDrive()">💾 Salvar no Google Drive</button>
        </div>
    </main>

    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <script src="script.js"></script>
</body>
</html>
